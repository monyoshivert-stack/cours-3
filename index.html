<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Inclusion Numérique - Bordeaux Métropole</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="info-panel">
        <h3>Inclusion Numérique</h3>
        <p>Localisation des lieux recensés par Bordeaux Métropole.</p>
        <div id="stats">Chargement des données...</div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- PapaParse pour lire le CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // Initialisation de la carte sur Bordeaux
        const map = L.map('map').setView([44.837789, -0.57918], 12);

        // Utilisation de CartoDB Positron (Alternative à OSM)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Chargement du fichier CSV
        const csvFile = "RAW_met_lieux_inclusion_numerique - RAW_met_lieux_inclusion_numerique.csv";

        Papa.parse(csvFile, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                let count = 0;

                data.forEach(row => {
                    const lat = parseFloat(row.latitude);
                    const lng = parseFloat(row.longitude);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        count++;
                        const marker = L.marker([lat, lng]).addTo(map);
                        
                        // Création du popup avec les infos
                        marker.bindPopup(`
                            <strong>${row.nom || "Nom inconnu"}</strong><br>
                            ${row.adresse_brut || ""}<br>
                            <em>${row.adresse_commune || ""}</em><br><br>
                            <strong>Public:</strong> ${row.public_cible || "Non précisé"}<br>
                            <strong>Tarif:</strong> ${row.tarifs || "Non précisé"}
                        `);
                    }
                });

                document.getElementById('stats').innerHTML = `<strong>${count}</strong> lieux affichés.`;
            },
            error: function(err) {
                console.error("Erreur lors de la lecture du CSV:", err);
                document.getElementById('stats').innerHTML = "Erreur de chargement.";
            }
        });
    </script>
</body>
</html>
